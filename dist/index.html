    <div id="captcha-page" style="font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#FFFFFF;">
      <div style="text-align:center;margin-bottom:30px;">

    <script>
      // Detect embed mode (loaded inside Makerkit iframe)
      var isEmbedMode = new URLSearchParams(window.location.search).get('embed') === 'true';
      // Expose to React app so it can hide the sidebar
      window.__EMBED_MODE__ = isEmbedMode;

      function renderTurnstile() {
        // Skip Turnstile on localhost (site key is for leadscrapper.pixnom.com only)
        var isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

        // In embed mode, skip ALL gates (Turnstile + login) — user is already authed in Makerkit
        if (isEmbedMode) {
          document.getElementById('captcha-page').style.display = 'none';
          document.getElementById('login-page').style.display = 'none';

          // If user already identified on this domain, go straight to app
          if (localStorage.getItem('loggedInUser')) {
            document.getElementById('root').style.display = 'block';
            return;
          }

          // First time via embed — show a minimal email prompt
          var embedPrompt = document.getElementById('embed-email-prompt');
          if (embedPrompt) {
            embedPrompt.style.display = 'flex';
          }
          return;
        }

        if (isLocal) {
          document.getElementById('captcha-page').style.display = 'none';
          if (localStorage.getItem('loggedIn') === 'true') {
            document.getElementById('root').style.display = 'block';
            if (typeof startInactivityTimer === 'function') startInactivityTimer();
          } else {
            document.getElementById('login-page').style.display = '';
          }
          return;
        }
        turnstile.render('#turnstile-container', {
          sitekey: '0x4AAAAAAC4rKkLey4Ps6zXP',
          theme: 'light',
          callback: function(token) {
            document.getElementById('captcha-page').style.display = 'none';
            if (localStorage.getItem('loggedIn') === 'true') {
              document.getElementById('root').style.display = 'block';
              if (typeof startInactivityTimer === 'function') startInactivityTimer();
            } else {
              document.getElementById('login-page').style.display = '';
            }
          }
        });
      }
    </script>

    <!-- ── EMBED EMAIL PROMPT (only shown in embed mode, first time) ── -->
    <div id="embed-email-prompt" style="display:none;min-height:100vh;align-items:center;justify-content:center;background:#f9fafb;font-family:'Inter',sans-serif;">
      <div style="background:#fff;border-radius:12px;padding:32px 28px;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:380px;width:90%;text-align:center;">
        <div style="font-size:2rem;margin-bottom:12px;">🔗</div>
        <h2 style="font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:600;color:#111827;margin:0 0 6px;">Connect Your Account</h2>
        <p style="color:#6B7280;font-size:.85rem;margin:0 0 20px;">Enter the email linked to your leads data.</p>
        <input id="embed-email-input" type="email" placeholder="you@company.com"
          style="width:100%;padding:10px 14px;border:1px solid #D1D5DB;border-radius:8px;font-size:.95rem;outline:none;box-sizing:border-box;margin-bottom:12px;" />
        <button id="embed-email-btn"
          style="width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:500;cursor:pointer;">
          Continue
        </button>
        <p id="embed-email-error" style="color:#EF4444;font-size:.8rem;margin-top:8px;display:none;">Please enter a valid email.</p>
      </div>
    </div>
    <script>
      (function() {
        var btn = document.getElementById('embed-email-btn');
        var input = document.getElementById('embed-email-input');
        var err = document.getElementById('embed-email-error');
        if (!btn || !input) return;

        function submit() {
          var email = input.value.trim().toLowerCase();
          if (!email || !email.includes('@')) {
            err.style.display = 'block';
            return;
          }
          err.style.display = 'none';
          localStorage.setItem('loggedInUser', email);
          localStorage.setItem('loggedIn', 'true');
          document.getElementById('embed-email-prompt').style.display = 'none';
          document.getElementById('root').style.display = 'block';
        }

        btn.addEventListener('click', submit);
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') submit(); });
      })();
    </script>

    <div id="login-page" style="display:none;">
      <div style="text-align:center; margin-bottom:40px; position:relative; z-index:1;">
        <div class="login-badge">Secure Access</div>
        <h1>Leadscrapper Pixnom</h1>
        <p class="login-subtitle">Enter your email to receive a secure login code.</p>

      <div class="login-card" style="position:relative; z-index:1;">
        <div class="card-title">
          <div class="icon">&#9993;</div>
          Authentication
        </div>

        <div id="email-step">
          <div class="field">
            <label for="login-email">Email Address <span class="req">*</span></label>
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
          </div>
          <button class="btn-login" id="btn-send-otp" onclick="sendOtp()">
            <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
              <span id="btn-send-otp-label">Send OTP</span>
              <div class="spinner" id="btn-send-otp-spinner" style="margin:0;"></div>
            </div>
          </button>
        </div>

        <div id="otp-step" style="display:none;">
          <div class="field">
            <label for="login-otp">Enter OTP Code <span class="req">*</span></label>
            <input type="text" id="login-otp" placeholder="123456" autocomplete="one-time-code" />
          </div>
          <button class="btn-login" id="btn-verify-otp" onclick="verifyOtp()">
            <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
              <span id="btn-verify-otp-label">Verify OTP</span>
              <div class="spinner" id="btn-verify-otp-spinner" style="margin:0;"></div>
            </div>
          </button>

    <!-- ── REACT APP ── -->
    <div id="root" style="display:none;"></div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
      let generatedOtp = '';
      let inactivityTimeout;

      async function sendOtp() {
        const email = document.getElementById('login-email').value.trim();
        if (!email || !email.includes('@')) {
          showToast('Please enter a valid email.', 'error');
          return;
        }

        const btn = document.getElementById('btn-send-otp');
        const spinner = document.getElementById('btn-send-otp-spinner');
        btn.disabled = true;
        spinner.style.display = 'block';

        generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();

        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          console.log("OTP:", generatedOtp);
          alert("LOCAL MODE\nYour OTP is: " + generatedOtp);
        }

        try {
          await fetch('send-otp.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, otp: generatedOtp })
          });
          showToast('OTP sent successfully!', 'success');
          document.getElementById('email-step').style.display = 'none';
          document.getElementById('otp-step').style.display = 'block';
          document.getElementById('login-otp').focus();
        } catch (error) {
          showToast('Using backup OTP (see console)', 'success');
          document.getElementById('email-step').style.display = 'none';
          document.getElementById('otp-step').style.display = 'block';
        } finally {
          btn.disabled = false;
          spinner.style.display = 'none';
        }
      }

      function verifyOtp() {
        const otp = document.getElementById('login-otp').value.trim();
        if (otp === generatedOtp) {
          showToast('Success!', 'success');
          const email = document.getElementById('login-email').value.trim().toLowerCase();
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('loggedInUser', email);
          // PostHog: reset identity then identify user after login (prevents cross-account merging)
          if (window.posthog) {
            posthog.reset();
            posthog.identify(email, { email: email });
          }
          showApp();
        } else {
          showToast('Invalid OTP code.', 'error');
        }
      }

      function showApp() {
        document.getElementById('captcha-page').style.display = 'none';
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('root').style.display = 'block';
        startInactivityTimer();
      }

      window.appLogout = function() {
        localStorage.removeItem('loggedIn');
        localStorage.removeItem('loggedInUser');
        location.reload();
      };

      function startInactivityTimer() {
        const reset = () => {
          clearTimeout(inactivityTimeout);
          inactivityTimeout = setTimeout(() => window.appLogout(), 600000);
        };
        ['mousemove', 'keydown', 'click', 'scroll'].forEach(e => window.addEventListener(e, reset));
        reset();
      }

      function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = type === 'error' ? 'show error' : 'show';
        setTimeout(() => t.className = '', 3500);
      }

      window.addEventListener('DOMContentLoaded', () => {
        // Always show captcha first — onTurnstileSuccess handles the rest
      });
    </script>
